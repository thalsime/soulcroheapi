name: ci

# Fluxo:
#   - PR para dev  -> roda os testes (check obrigatório da proteção de branch).
#   - push em dev  -> testa -> (se verde) merge em main -> deploy -> release.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

# Permissão mínima no nível do workflow. packages:write existe aqui só porque o
# job 'deploy' é um workflow reutilizável (uses:) e não pode declarar as próprias
# permissões - ele herda estas. Os demais jobs as restringem abaixo (por job).
permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: test-ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Instalar dependências
        run: pip install -r requirements-dev.txt
      - name: Rodar testes (pytest + cobertura)
        run: pytest

  merge:
    needs: test
    # Só promove em push na dev (no PR, apenas o job 'test' roda).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Fast-forward main para dev
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main dev
          if ! git merge-base --is-ancestor origin/main origin/dev; then
            echo "ERRO: origin/dev nao descende de origin/main; fast-forward impossivel."
            echo "Solucao: rebase de dev sobre main antes do push."
            exit 1
          fi
          git checkout -B main origin/main
          git merge --ff-only origin/dev
          git push origin main

  deploy:
    needs: merge
    if: github.event_name == 'push'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit

  release:
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
      - name: Criar tag e release (semver, bump de patch)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            ver=${latest#v}
            major=${ver%%.*}; rest=${ver#*.}; minor=${rest%%.*}; patch=${rest#*.}
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Próxima versão: $next"
          # gh cria a tag (no commit de main) e a release de forma atômica.
          gh release create "$next" --target main --generate-notes --title "$next"
