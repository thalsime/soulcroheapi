name: ci

# Fluxo:
#   - PR para dev  -> roda os testes (check obrigatório da proteção de branch).
#   - push em dev  -> testa -> (se verde) merge em main -> deploy -> release.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

# Permissão mínima no nível do workflow. packages:write existe aqui só porque o
# job 'deploy' é um workflow reutilizável (uses:) e não pode declarar as próprias
# permissões - ele herda estas. Os demais jobs as restringem abaixo (por job).
permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: test-ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Instalar dependências
        run: pip install -r requirements-dev.txt
      - name: Rodar testes (pytest + cobertura)
        run: pytest

  merge:
    needs: test
    # Só promove em push na dev (no PR, apenas o job 'test' roda).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Promover dev para main (via Pull Request)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git fetch origin main dev
          # Nada a promover se a main ja reflete o conteudo da dev.
          if git diff --quiet origin/main origin/dev; then
            echo "main ja reflete dev; nada a promover."
            exit 0
          fi
          # Abre o PR dev->main (ou reaproveita um aberto). Mesclar o PR e a acao
          # sancionada pela regra de protecao da main: dispensa bypass do pipeline.
          num=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')
          if [ -z "$num" ]; then
            gh pr create --base main --head dev \
              --title "Promover dev para main" \
              --body "Promocao automatica apos os testes passarem na dev."
            num=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')
          fi
          echo "PR de promocao: #$num"
          # Mescla (merge commit). Tenta algumas vezes ate a mesclabilidade computar.
          for i in 1 2 3 4 5; do
            if gh pr merge "$num" --merge; then
              echo "PR #$num mesclado em main."
              exit 0
            fi
            echo "merge ainda indisponivel; nova tentativa em 5s..."
            sleep 5
          done
          echo "ERRO: nao foi possivel mesclar o PR #$num em main."
          exit 1

  deploy:
    needs: merge
    if: github.event_name == 'push'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit

  release:
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
      - name: Criar tag e release (semver, bump de patch)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            ver=${latest#v}
            major=${ver%%.*}; rest=${ver#*.}; minor=${rest%%.*}; patch=${rest#*.}
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Próxima versão: $next"
          # gh cria a tag (no commit de main) e a release de forma atômica.
          gh release create "$next" --target main --generate-notes --title "$next"
