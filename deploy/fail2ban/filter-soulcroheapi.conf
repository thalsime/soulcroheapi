# Filtro Fail2ban para a API Soul Crochê.
# Vai em: /etc/fail2ban/filter.d/soulcroheapi.conf
# Casa requisições com status 401/403/404/429 no log do nginx (formato combined):
# abuso do token (401 em /contatos/), sondagem da raiz (403), scanning (404) e
# quem estoura o limite de envios (429, throttle do contato).
# OPTIONS (preflight CORS) fica de fora da lista de métodos, evitando falso-positivo.
[Definition]
failregex = ^<HOST> .*"(GET|POST|HEAD|PUT|PATCH|DELETE) [^"]*" (401|403|404|429)
ignoreregex =
