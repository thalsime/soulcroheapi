# Jail Fail2ban para a API Soul Crochê.
# Vai em: /etc/fail2ban/jail.d/soulcroheapi.conf
#
# A API fica atrás do Cloudflare (proxy). Como o banimento por iptables atua no
# IP que abre a conexão TCP, ele protege contra abuso DIRETO ao IP de origem.
# Os ranges da Cloudflare entram no ignoreip para nunca banir o proprio Cloudflare
# (o que bloquearia todos os usuarios legitimos). Abuso vindo via Cloudflare deve
# ser tratado nas regras/WAF da propria Cloudflare.
[soulcroheapi]
enabled  = true
port     = http,https
filter   = soulcroheapi
logpath  = /var/log/nginx/soulcroheapi.access.log
maxretry = 10
findtime = 60
bantime  = 3600
ignoreip = 127.0.0.1/8 ::1 173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22 141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20 197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13 104.24.0.0/14 172.64.0.0/13 131.0.72.0/22 2400:cb00::/32 2606:4700::/32 2803:f800::/32 2405:b500::/32 2405:8100::/32 2a06:98c0::/29 2c0f:f248::/32
