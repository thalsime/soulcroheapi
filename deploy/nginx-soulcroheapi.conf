# Vhost do nginx (host) para a API. Vai em:
#   /etc/nginx/sites-available/api.exemplo.com.conf
# Habilitar com symlink em sites-enabled/ e recarregar o nginx.

# Zona de rate limit do /admin/ (mitiga força bruta no login). Fica fora do
# server{} porque limit_req_zone é diretiva do contexto http (este arquivo é
# incluído dentro do http{}). 30 req/min por IP, com folga (burst) para humanos.
# Atrás de CDN/proxy, o IP visto aqui é o do proxy: configure o módulo realip
# (set_real_ip_from <ranges>; real_ip_header CF-Connecting-IP;) para chavear pelo
# IP real do cliente.
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=30r/m;

server {
    listen 80;
    server_name api.exemplo.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.exemplo.com;

    # Não revela a versão do nginx (no cabeçalho Server e nas páginas de erro).
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/api.exemplo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.exemplo.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.exemplo.com/chain.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Log dedicado da API (lido pelo Fail2ban).
    access_log /var/log/nginx/soulcroheapi.access.log;

    # Cabeçalhos de segurança do nginx. HSTS, X-Content-Type-Options e
    # X-Frame-Options são emitidos pelo Django (passam pelo proxy) - não repita
    # aqui para não duplicar. O nginx cuida dos que o Django não emite:
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    # Cabeçalhos do proxy (herdados pelas location que fazem proxy_pass).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;

    # Permite o upload das imagens de produto pelo admin.
    client_max_body_size 10M;

    # As imagens enviadas no admin são servidas direto pelo nginx (mais rápido).
    # Este bloco tem add_header próprio, então NÃO herda os add_header do server:
    # por isso a lista de segurança é repetida aqui (regra do nginx).
    location /media/ {
        alias <APP_DIR>/media/;
        access_log off;
        expires 30d;
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'none'" always;
    }

    # Admin: mesmo proxy do resto, com rate limit para frear força bruta no login.
    location /admin/ {
        limit_req zone=admin_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
    }

    # Todo o resto (API, estáticos via WhiteNoise) vai para o container.
    location / {
        proxy_pass http://127.0.0.1:8000;
    }
}
